services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ReadAloudDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chatterbox:
    build: ./ChatterBox
    volumes:
      - chatterbox_prompts:/app/audio_prompts
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5101"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ReadAloudDb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      ChatterBox__BaseUrl: "http://chatterbox:5102"
      JwtSettings__Key: "${JWT_SECRET_KEY:-DefaultSecretKey1234567890DefaultSecretKey1234567890}"
      JwtSettings__Issuer: ReadAloudAPI
      JwtSettings__Audience: ReadAloudClient
      Cors__AllowedOrigins__0: "${FRONTEND_ORIGIN:-https://readaloud.yorickteriele.nl}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      chatterbox:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    networks:
      - default
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  chatterbox_prompts:

networks:
  dokploy-network:
    external: true
