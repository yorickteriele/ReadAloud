version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ReadAloudDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chatterbox:
    build: ./ChatterBox
    volumes:
      - chatterbox_prompts:/app/audio_prompts
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ReadAloudDb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      ChatterBox__BaseUrl: "http://chatterbox:8000"
      JwtSettings__Key: "${JWT_SECRET_KEY:-DefaultSecretKey1234567890DefaultSecretKey1234567890}"
      JwtSettings__Issuer: ReadAloudAPI
      JwtSettings__Audience: ReadAloudClient
      AllowedOrigins: "${ALLOWED_ORIGINS:-http://localhost}"
    depends_on:
      postgres:
        condition: service_healthy
      chatterbox:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./ReadAloud.Web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  chatterbox_prompts:
